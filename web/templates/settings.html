{% extends "base.html" %}

{% block title_extra %} – Einstellungen{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Einstellungen</h1>
</div>

<form method="post" class="settings-form">
    <div class="form-group">
        <label for="api_key">OpenAI API-Key</label>
        <input type="password" id="api_key" name="api_key"
               placeholder="sk-..." autocomplete="off">
        <small>Aktuell: {{ masked_key }}</small>
    </div>

    <div class="form-group">
        <label for="model">OpenAI Modell</label>
        <select id="model" name="model">
            <option value="gpt-4o-mini" {% if current_model == 'gpt-4o-mini' %}selected{% endif %}>gpt-4o-mini (empfohlen)</option>
            <option value="gpt-4o" {% if current_model == 'gpt-4o' %}selected{% endif %}>gpt-4o</option>
            <option value="gpt-4-turbo" {% if current_model == 'gpt-4-turbo' %}selected{% endif %}>gpt-4-turbo</option>
            <option value="gpt-3.5-turbo" {% if current_model == 'gpt-3.5-turbo' %}selected{% endif %}>gpt-3.5-turbo</option>
        </select>
    </div>

    <button type="submit" class="btn btn-primary">Speichern</button>
</form>
{% endblock %}
